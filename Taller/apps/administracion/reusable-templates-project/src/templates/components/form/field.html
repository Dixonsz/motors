<div class="form-field">
    <label for="{{fieldId}}" class="form-label">{{fieldLabel}}</label>
    <input type="{{fieldType}}" id="{{fieldId}}" name="{{fieldName}}" class="form-input" placeholder="{{fieldPlaceholder}}" required="{{isRequired}}">
    <span class="form-error">{{errorMessage}}</span>
</div>
