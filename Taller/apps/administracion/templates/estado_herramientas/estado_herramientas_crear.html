{% extends 'base.html' %}
{% block title %}Nuevo Estado{% endblock %}
{% block page_title %}Nuevo Estado{% endblock %}

{% block page_actions %}
<nav aria-label="Navegacion de estados">
    <a href="{% url 'estado_herramientas_lista' %}">Regresar</a>
</nav>
{% endblock %}

{% block content %}
<h1>Crear Nuevo Estado para Herramientas</h1>
    <form action="" method="post">
        {% csrf_token %}

        <input type="text" name="nombre" required placeholder="Nombre del Estado">
        <label> 
            <input type="checkbox" name="is_active" checked> Activo 
        </label>

        <br>
        <button type="submit">Guardar</button>

    </form>
{% endblock %}
