{% extends 'base.html' %}
{% block title %}Nuevo Estado{% endblock %}
{% block page_title %}Nuevo Estado{% endblock %}

{% block page_actions %}
<nav aria-label="Navegacion de estados">
    <a href="{% url 'estados_lista' %}">Regresar</a>
</nav>
{% endblock %}

{% block content %}
<h1>Crear Nuevo Estado</h1>
    <form action="" method="post">
        {% csrf_token %}
        <br>
        <label for="nombre">Nombre:</label>
        <input type="text" name="nombre" required placeholder="Nombre del Estado">
        <br>
        <label for="descripcion">Descripción:</label>
        <input type="text" name="descripcion" placeholder="Descripción del Estado">
        <br>
        <label><input type="checkbox" name="is_active" checked> Activo </label>
        <br>
        <button type="submit">Guardar</button>

    </form>
{% endblock %}
