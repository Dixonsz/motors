{% extends 'base.html' %}
{% block title %}Crear Servicio{% endblock %}
{% block page_title %}Crear Servicio{% endblock %}

{% block page_actions %}
<nav aria-label="Navegacion de usuarios">
    <a href="{% url 'servicios_lista' %}">Regresar</a>
</nav>
{% endblock %}

{% block content %}
<h1>Crear Servicio</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" id="nombre" name="nombre" required placeholder="Nombre">
        <br>
        <input type="text" id="descripcion" name="descripcion" required placeholder="Descripción">
        <br>
        <select name="categoria_id" id="categoria_id" required>
            <option value="">Seleccione una categoría</option>
            {% for categoria in categorias %}
                <option value="{{ categoria.id }}">{{ categoria.nombre }}</option>
            {% endfor %}
        </select>
        <br>
        <input type="number" id="precio_base" name="precio_base" step="0.01" required placeholder="Precio Base">
        <br>
        <label for="duracion_estimada">Duración estimada (HH:MM):</label>
        <input type="time" id="duracion_estimada" name="duracion_estimada" step="60" required>
        <br>
        <label for="is_active">Activo:</label>
        <input type="checkbox" id="is_active" name="is_active" checked>
        <br>
        <button type="submit">Guardar</button>
    </form>
{% endblock %}
