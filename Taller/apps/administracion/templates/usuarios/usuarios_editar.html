{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block page_title %}Editar Usuario{% endblock %}

{% block page_actions %}
<nav aria-label="Navegacion de usuarios">
    <a href="{% url 'usuarios_lista' %}">Volver al listado</a>
</nav>
{% endblock %}

{% block content %}
<h1>Editar Usuario</h1>
    <form method="post">
        {% csrf_token %}
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre }}" required>
        <br>
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" value="{{ usuario.apellido }}" required>
        <br>
        <label for="telefono">Teléfono:</label>
        <input type="text" id="telefono" name="telefono" value="{{ usuario.telefono }}" required>
        <br>
        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" value="{{ usuario.email }}" required>
        <br>
        <label for="rol_id">Rol:</label>
        <select id="rol_id" name="rol_id" required>
            <option value="">Seleccione un rol</option>
            {% for rol in roles %}
                <option value="{{ rol.id }}" {% if usuario.rol_id == rol.id %}selected{% endif %}>{{ rol.nombre }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password">
        <br>
        <br>
        <label for="password_confirm">Confirmar Contraseña:</label>
        <input type="password" id="password_confirm" name="password_confirm">
        <br>
        <button type="submit">Guardar</button>
    </form>

    <script>



    </script>
{% endblock %}
