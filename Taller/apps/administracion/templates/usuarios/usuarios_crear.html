{% extends 'base.html' %}
{% block title %}Crear Usuario{% endblock %}
{% block page_title %}Crear Usuario{% endblock %}

{% block page_actions %}
<nav aria-label="Navegacion de usuarios">
    <a href="{% url 'usuarios_lista' %}">Volver al listado</a>
</nav>
{% endblock %}

{% block content %}
<h1>Crear Usuario</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" id="nombre" name="nombre" required placeholder="Nombre">
        <br>
        <input type="text" id="apellido" name="apellido" required placeholder="Apellido">
        <br>
        <input type="text" id="telefono" name="telefono" required placeholder="Teléfono">
        <br>
        <input type="email" id="correo" name="correo" required placeholder="Correo">
        <br>
        <select id="rol_id" name="rol_id" required>
            <option value="">Seleccione un rol</option>
            {% for rol in roles %}
                <option value="{{ rol.id }}">{{ rol.nombre }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <br>
        <label for="password_confirm">Confirmar Contraseña:</label>
        <input type="password" id="password_confirm" name="password_confirm" required>
        <br><br>
        <span id="password-error" class="error" style="color: red;"></span>
        <button type="submit">Guardar</button>
    </form>

    <script>
        const passwordInput = document.getElementById('password');
        const passwordConfirmInput = document.getElementById('password_confirm');
        const error = document.getElementById('password-error');
        

        function validate() {
           if (passwordConfirmInput.value === "" || passwordInput.value === "") {
                error.textContent = 'Ambos campos de contraseña son obligatorios.';
                return false;
            } 
            if (passwordInput.value !== passwordConfirmInput.value) {
                error.textContent = 'Las contraseñas no coinciden.';
                return false;
            }
            error.textContent = '';
            error.style.color = 'green';
        }

        passwordInput.addEventListener('input', validate);
        passwordConfirmInput.addEventListener('input', validate);

    </script>
{% endblock %}
