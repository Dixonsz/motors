{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block page_title %}Editar Usuario{% endblock %}

{% block page_actions %}
<nav aria-label="Navegacion de usuarios">
    <a href="{% url 'clientes_lista' %}">Regresar</a>
</nav>
{% endblock %}

{% block content %}
<h1>Actualizar los datos del cliente</h1>
    <form method="post">
        {% csrf_token %}
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="{{ cliente.nombre }}" required>
        <br>
    
        <label for="telefono">Teléfono:</label>
        <input type="text" id="telefono" name="telefono" value="{{ cliente.telefono }}" required>
        <br>
        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" value="{{ cliente.correo }}" required>
        <br>
        <label for="cedula">Cédula:</label>
        <input type="text" name="cedula" id="cedula" value="{{ cliente.cedula }}" required>
        <br>
        <label for="direccion">Dirección:</label>
        <input type="text" name="direccion" id="direccion" value="{{ cliente.direccion }}" required>
        <br>
        <button type="submit">Guardar</button>
    </form>

    <script>



    </script>
{% endblock %}
