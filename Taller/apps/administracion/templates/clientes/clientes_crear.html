{% extends 'base.html' %}
{% block title %}Crear Cliente{% endblock %}
{% block page_title %}Crear Cliente{% endblock %}

{% block page_actions %}
<nav aria-label="Navegacion de clientes">
    <a href="{% url 'clientes_lista' %}">Regresar</a>
</nav>
{% endblock %}

{% block content %}
<h1>Ingrese los datos del nuevo cliente</h1>
    <form method="post">
        {% csrf_token %}
        <br>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Nombre">
        <br>
        <label for="apellido">Apellido:</label>
        <input type="email" id="apellido" name="apellido" required placeholder="Apellido">
        <br>
        <label for="telefono">Teléfono:</label>
        <input type="number" id="telefono" name="telefono" required placeholder="Teléfono">
        <br>
        <label for="cedula">Cédula:</label>
        <input type="number" name="cedula" id="cedula" required placeholder="Cédula">
        <br>
        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" required placeholder="Correo">
        <br>
        <label for="direccion">Dirección:</label>
        <input type="text" name="direccion" id="direccion" required placeholder="Dirección">
        <br>
        <button type="submit">Guardar</button>
    </form>
{% endblock %}
