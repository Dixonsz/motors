{% extends 'base.html' %}
{% block title %}Editar evidencia{% endblock %}
{% block page_title %}Editar evidencia{% endblock %}

{% block page_actions %}
<nav aria-label="Acciones de evidencia">
	<a href="{% url 'evidencia_lista' evidencia.recepcion.id %}">Volver a evidencias</a>
</nav>
{% endblock %}

{% block content %}
<section aria-labelledby="evidencia-editar-title">
	<h2 id="evidencia-editar-title">Actualizar evidencia #{{ evidencia.id }}</h2>

	<form method="post" enctype="multipart/form-data">
		{% csrf_token %}

		<div>
			<label for="tipo">Tipo</label>
			<select id="tipo" name="tipo" required>
				<option value="foto" {% if evidencia.tipo == 'foto' %}selected{% endif %}>Foto</option>
				<option value="video" {% if evidencia.tipo == 'video' %}selected{% endif %}>Video</option>
				<option value="imagen" {% if evidencia.tipo == 'imagen' %}selected{% endif %}>Imagen</option>
			</select>
		</div>

		<div>
			<label for="url_archivo">Reemplazar archivo (opcional)</label>
			<input type="file" id="url_archivo" name="url_archivo">
		</div>

		<div>
			<label for="descripcion">Descripcion</label>
			<textarea id="descripcion" name="descripcion" rows="3">{{ evidencia.descripcion }}</textarea>
		</div>

		<button type="submit">Guardar cambios</button>
		<a href="{% url 'evidencia_lista' evidencia.recepcion.id %}">Cancelar</a>
	</form>
</section>
{% endblock %}
