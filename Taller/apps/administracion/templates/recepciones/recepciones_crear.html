{% extends 'base.html' %}
{% block title %}Crear recepcion{% endblock %}
{% block page_title %}Crear recepcion{% endblock %}

{% block page_actions %}
<nav aria-label="Acciones de recepcion">
    <a href="{% url 'recepcion_lista' %}">Volver al listado</a>
</nav>
{% endblock %}

{% block content %}
<section aria-labelledby="recepcion-crear-title">
    <h2 id="recepcion-crear-title">Registrar nueva recepcion</h2>

    <form method="post">
        {% csrf_token %}

        <div>
            <label for="vehiculo_id">Vehiculo</label>
            <select id="vehiculo_id" name="vehiculo_id" required>
                <option value="">Seleccione un Vehiculo</option>
                {% for vehiculo in vehiculos %}
                    <option value="{{ vehiculo.id }}">{{ vehiculo.placa }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="usuario_id">Usuario</label>
            <select id="usuario_id" name="usuario_id" required>
                <option value="">Seleccione un Usuario</option>
                {% for usuario in usuarios %}
                    <option value="{{ usuario.id }}">{{ usuario.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="fecha_ingreso">Fecha de ingreso</label>
            <input type="text" id="fecha_ingreso" name="fecha_ingreso" value="{% now 'Y-m-d H:i' %}" readonly>
        </div>

        <div>
            <label for="observaciones">Observaciones</label>
            <input type="text" id="observaciones" name="observaciones" required>
        </div>

        <div>
            <label for="kilometraje">Kilometraje</label>
            <input type="number" id="kilometraje" name="kilometraje" required>
        </div>

        <div>
            <label for="nivel_combustible">Nivel de combustible</label>
            <input type="number" id="nivel_combustible" name="nivel_combustible" min="1" max="100" step="1" required placeholder="Ingrese solamente valores entre 1-100">
            <div class="fuel-gauge" id="fuel-gauge-crear" data-fuel="1" aria-live="polite">
                <span class="fuel-mark">E</span>
                <span class="fuel-tank" aria-hidden="true">
                    <span class="fuel-fill" id="fuel-fill-crear" style="width: 1%;"></span>
                </span>
                <span class="fuel-mark">F</span>
                <span class="fuel-value" id="fuel-value-crear">1%</span>
            </div>
        </div>

        <button type="submit">Siguiente paso</button>
    </form>
</section>

<script>
    (function () {
        const input = document.getElementById('nivel_combustible');
        const gauge = document.getElementById('fuel-gauge-crear');
        const fill = document.getElementById('fuel-fill-crear');
        const label = document.getElementById('fuel-value-crear');

        if (!input || !gauge || !fill || !label) return;

        const syncFuel = () => {
            const raw = parseInt(input.value, 10);
            const value = Number.isFinite(raw) ? Math.min(100, Math.max(1, raw)) : 1;
            fill.style.width = value + '%';
            label.textContent = value + '%';
            gauge.dataset.fuel = value;

            gauge.classList.remove('low', 'medium', 'high');
            if (value <= 25) {
                gauge.classList.add('low');
            } else if (value <= 60) {
                gauge.classList.add('medium');
            } else {
                gauge.classList.add('high');
            }
        };

        input.addEventListener('input', syncFuel);
        syncFuel();
    })();
</script>
{% endblock %}
